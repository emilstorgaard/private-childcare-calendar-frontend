services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    image: private-childcare-calendar-frontend:latest
    container_name: private-childcare-calendar-frontend
    ports:
      - '8082:3000'
    restart: unless-stopped
    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0